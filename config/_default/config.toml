baseurl = "https://mattthetekie.github.io/MattTheTekie/"
languageCode = "en-us"
paginate = 5
title = "Welcome!"
disqusShortname = "hugo-theme-stack"
DefaultContentLanguage = "ja"
hasCJKLanguage = "ja"

[permalinks]
post = "/p/:slug/"
page = "/:slug/"

[params]
mainSections = [ "post" ]
featuredImageField = "image"
rssFullContent = true
favicon = "https://raw.githubusercontent.com/MattTheTekie/MattTheTekie/master/Personal-Scripts/Images/94870997.png"

  [params.footer]
  since = 2_021

  [params.dateFormat]
  published = "Jan 02, 2006"
  lastUpdated = "Jan 02, 2006 15:04 MST"

  [params.sidebar]
  subtitle = "落書き帳みたいなもの"

    [params.sidebar.avatar]
    enabled = true
    local = false
    src = "https://raw.githubusercontent.com/MattTheTekie/MattTheTekie/master/Personal-Scripts/Images/94870997.png"

  [params.article]
  math = false
  toc = true
  readingTime = true

    [params.article.license]
    enabled = true
    default = "MattTheTekie All rights reserved."

  [params.comments]
  enabled = true
  provider = "disqus"

    [params.comments.disqusjs]

    [params.comments.utterances]
    issueTerm = "pathname"

    [params.comments.remark42]

    [params.comments.vssue]
    autoCreateIssue = false

    [params.comments.waline]
    emoji = [ "https://cdn.jsdelivr.net/gh/walinejs/emojis@1.0.0/tw-emoji" ]
    requiredMeta = [ "name", "email", "url" ]

      [params.comments.waline.locale]
      admin = "Admin"

    [params.comments.twikoo]

    [params.comments.giscus]
    reactionsEnabled = 1
    emitMetadata = 0

    [params.comments.gitalk]

    [params.comments.cusdis]

  [params.widgets]
  enabled = [ "search", "archives", "tag-cloud" ]

    [params.widgets.archives]
    limit = 5

    [params.widgets.tagCloud]
    limit = 10

[params.opengraph.twitter]
card = "summary"

[params.defaultImage.opengraph]
enabled = true
local = false
src = "/site/avatar.webp"

  [params.colorScheme]
  toggle = true
  default = "auto"

[params.imageProcessing.cover]
enabled = true

[params.imageProcessing.content]
enabled = true

[[menu.main]]
identifier = "home"
name = "Home"
url = "/"
weight = -100

  [menu.main.params]
  newTab = false
  icon = "home"

[[menu.social]]
identifier = "github"
name = "GitHub"
url = "https://github.com/MattTheTekie"

  [menu.social.params]
  icon = "brand-github"

[[menu.social]]
identifier = "twitter"
name = "Twitter"
url = "https://twitter.com/LuigiBlood"

  [menu.social.params]
  icon = "brand-twitter"

[related]
includeNewer = true
threshold = 60
toLower = false

  [[related.indices]]
  name = "tags"
  weight = 100

  [[related.indices]]
  name = "categories"
  weight = 200

[markup.goldmark.renderer]
unsafe = false

[markup.tableOfContents]
endLevel = 4
ordered = true
startLevel = 2

[markup.highlight]
noClasses = false
